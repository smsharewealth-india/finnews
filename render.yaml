### Step 4 — Trigger a new deploy on Render

Go to your Render dashboard → FinSights service → click **Manual Deploy → Deploy latest commit**

The build should now complete in 2–3 minutes with only:
```
pip install -r requirements.txt   ✅
uvicorn app.main:app ...          ✅

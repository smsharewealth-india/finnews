services:
  - type: web
    name: finsights
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
    autoDeploy: true
```

Click **Commit changes**.

